{% extends "base.html" %}
{% block title %}手动添加退款 - {{ system_name }}{% endblock %}
{% block page_title %}添加退款记录{% endblock %}
{% block page_subtitle %}手动录入拼多多退款申请（无API时手动输入）{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">所属店铺 <span class="text-danger">*</span></label>
                            <select class="form-select" name="shop_id" required>
                                <option value="">请选择店铺</option>
                                {% for shop in shops %}
                                <option value="{{ shop.id }}">{{ shop.name }}（{{ shop.platform }}）</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">订单号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="order_id"
                                   placeholder="拼多多订单号" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">买家ID <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="buyer_id"
                                   placeholder="买家平台ID" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">买家昵称</label>
                            <input type="text" class="form-control" name="buyer_name"
                                   placeholder="买家昵称（可选）">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">退款金额（元）</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" class="form-control" name="refund_amount"
                                       placeholder="0.00" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">平台截止时间</label>
                            <input type="datetime-local" class="form-control" name="deadline_at">
                            <div class="form-text">距截止时间<24小时将显示红色预警</div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">退款原因</label>
                            <textarea class="form-control" name="refund_reason" rows="3"
                                      placeholder="买家填写的退款原因..."></textarea>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> 保存退款记录
                        </button>
                        <a href="{{ url_for('refund.index') }}" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
