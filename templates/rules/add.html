{% extends "base.html" %}
{% block title %}添加规则{% endblock %}
{% block page_title %}添加规则{% endblock %}
{% block page_subtitle %}关键词触发规则，三层处理第一层{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width: 750px;">
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">所属行业 <span class="text-danger">*</span></label>
                    <select class="form-select" name="industry_id" required>
                        <option value="">请选择行业</option>
                        {% for industry in industries %}
                        <option value="{{ industry.id }}">{{ industry.icon }} {{ industry.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">规则名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="name" required placeholder="如：换号咨询">
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-semibold">触发关键词 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="trigger_keywords" required
                           placeholder="换号,换账号,账号不能用">
                    <div class="form-text">多个关键词用英文逗号分隔</div>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold">匹配模式</label>
                    <select class="form-select" name="match_mode">
                        <option value="any">任一匹配</option>
                        <option value="all">全词匹配</option>
                        <option value="exact">精确匹配</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold">优先级</label>
                    <input type="number" class="form-control" name="priority" value="0" min="0" max="100">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">回复内容 <span class="text-danger">*</span></label>
                    <textarea class="form-control" name="reply_content" rows="5" required
                              placeholder="规则触发后的回复内容，支持变量：{buyer_name}买家昵称、{order_id}订单号"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">触发动作（可选）</label>
                    <select class="form-select" name="action_type">
                        <option value="">无动作</option>
                        <option value="exchange">自动换号</option>
                        <option value="refund_guide">退款引导</option>
                        <option value="transfer_human">转人工</option>
                    </select>
                </div>
            </div>
            
            <div class="alert alert-info mt-3 small">
                <i class="bi bi-lightbulb"></i>
                <strong>提示：</strong>规则匹配优先级最高（第一层），匹配成功立即返回，不调用AI节省成本。
            </div>
            
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> 保存规则
                </button>
                <a href="{{ url_for('rules.index') }}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
