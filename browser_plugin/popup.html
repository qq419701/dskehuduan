<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱客服采集插件</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #1890ff, #36cfc9);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 18px; margin-bottom: 4px; }
    .header p { font-size: 12px; opacity: 0.85; }
    .content { padding: 16px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; color: #555; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1890ff; }
    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.3s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #1890ff; }
    input:checked + .slider:before { transform: translateX(22px); }
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-primary { background: #1890ff; color: white; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary { background: #52c41a; color: white; }
    .btn-secondary:hover { opacity: 0.88; }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
    .status.success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .status.error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
    .status.hidden { display: none; }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 爱客服采集插件</h1>
    <p>拼多多消息采集 &amp; AI自动回复 &amp; 订单同步</p>
  </div>

  <div class="content">
    <div class="switch-row">
      <span style="font-weight:500;">启用采集</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="form-group">
      <label for="shopTokenInput">Shop Token（在爱客服后台获取）</label>
      <input type="text" id="shopTokenInput" placeholder="粘贴 shop_token 值">
    </div>

    <div class="form-group">
      <label for="serverUrlInput">服务器地址</label>
      <input type="text" id="serverUrlInput" value="http://39.103.98.34:8000" placeholder="http://...">
    </div>

    <div class="switch-row">
      <span style="font-weight:500;">审核模式（AI只填入，不自动发送）</span>
      <label class="switch">
        <input type="checkbox" id="reviewModeToggle">
        <span class="slider"></span>
      </label>
    </div>

    <button class="btn btn-primary" id="saveBtn">💾 保存设置</button>
    <button class="btn btn-secondary" id="testConnBtn" style="margin-top:8px;">🔌 测试连接</button>
    <div class="status hidden" id="statusMsg"></div>
  </div>

  <div class="footer">
    爱客服采集插件 v2.0 · 与 aikefu 系统配套使用
    <div id="connStatus" style="margin-top:4px;font-size:11px;color:#999;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
